name: Run Gradle on PRs
on:
  pull_request:
  push:
      branches: [main]
jobs:
    assemble:
      timeout-minutes: 300
      strategy:
          matrix:
              os: [ubuntu-latest,macos-latest]
              version: [17]
              vendor: [zulu]
      runs-on: ${{ matrix.os }}
      steps:
          - uses: actions/checkout@v7
          - uses: actions/setup-java@v5
            with:
                distribution:  ${{ matrix.vendor }}
                java-version:  ${{ matrix.version }}

          - name: Setup Gradle
            uses: gradle/actions/setup-gradle@v6
          - name: Build Process Watcher
            uses: cdsap/build-process-watcher@v0.6.2
            with:
                remote_monitoring: 'true'
                export_to_bigquery: 'true'
          - name: Execute Gradle build
            run:  ./gradlew test
    fatbinary:
        timeout-minutes: 300
        strategy:
            matrix:
                os: [ubuntu-latest,macos-latest]
                version: [17]
                vendor: [zulu, liberica]
        runs-on: ${{ matrix.os }}
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-java@v5
              with:
                  distribution:  ${{ matrix.vendor }}
                  java-version:  ${{ matrix.version }}

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v6
            - name: Build Process Watcher
              uses: cdsap/build-process-watcher@v0.6.2
              with:
                  remote_monitoring: 'true'
                  export_to_bigquery: 'true'
            - name: Execute Gradle build
              run:  |
                ./gradlew :cli:fatBinary
                ./cli/artifacttransform --max-builds 50 --api-key=${{ secrets.GE_API_KEY }} --url=${{ secrets.GE_URL }} --project=nowinandroid
            - name: Verify report outputs were generated
              run: |
                shopt -s nullglob
                html=( artifact-transforms-*.html )
                csv=( artifact-transforms-*.csv )
                txt=( summary-artifact-transforms-*.txt )
                echo "HTML: ${html[*]:-<none>}"
                echo "CSV:  ${csv[*]:-<none>}"
                echo "TXT:  ${txt[*]:-<none>}"
                if [ ${#html[@]} -eq 0 ]; then echo "::error::No HTML report was generated"; exit 1; fi
                if [ ${#csv[@]} -eq 0 ]; then echo "::error::No CSV report was generated"; exit 1; fi
                if [ ${#txt[@]} -eq 0 ]; then echo "::error::No summary text report was generated"; exit 1; fi
                # the HTML must be a self-contained report with Chart.js inlined (no external requests)
                grep -q "Artifact Transform Report" "${html[0]}" || { echo "::error::HTML report missing expected title"; exit 1; }
                grep -q "Chart.js v4" "${html[0]}" || { echo "::error::HTML report is missing the inlined Chart.js"; exit 1; }
                echo "HTML report verified: ${html[0]}"
            - name: Archive production artifacts
              uses: actions/upload-artifact@v7
              with:
                name: report-${{ matrix.vendor }}-${{ matrix.os }}--${{ matrix.version }}
                path: |
                   ./*.txt
                   ./*.csv
                   ./*.html
